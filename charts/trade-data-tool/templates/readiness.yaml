{{- if (default dict .Values.readiness).enabled }}
{{/*
Onyxia derives a service's ready/green state from the readiness of the FIRST pod
(tasks[0]) carrying app.kubernetes.io/instance=<release> — it ignores controllers,
helm status and HTTP reachability (verified: onyxia-web onyxiaApi.ts areAllTasksReady;
onyxia-api HelmAppsService lists instance-labelled pods, unsorted → in practice
lexicographic by name). With many service pods that first pod is arbitrary, so a
backend can go green before the web UI serves (→ 503 on click).

This marker fixes that: its pod name sorts FIRST (the "0readiness" component begins
with a digit, which sorts before every service's letter-initial name), so it is
tasks[0]; and its readiness probe passes only when EVERY TDT Service answers HTTP —
each backend's /health (the same endpoint their own readiness probes gate on) plus
the web UI's /. Net effect: Onyxia is green exactly when the whole suite is serving.
*/}}
{{- $ctx := . }}
{{- $urls := list }}
{{- range $key, $s := .Values.services }}
{{- $urls = append $urls (printf "http://%s:%d/health" (include "tdt.svcName" (dict "ctx" $ctx "key" $key)) (int $s.port)) }}
{{- end }}
{{- $webSvc := include "tdt.svcName" (dict "ctx" $ctx "key" "web") }}
{{- $urls = append $urls (printf "http://%s:%d/" $webSvc (int .Values.web.port)) }}
{{- $urlList := join " " $urls }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-0readiness" (include "tdt.fullname" .) | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "tdt.labels" . | nindent 4 }}
    app.kubernetes.io/component: readiness
spec:
  replicas: {{ .Values.global.suspend | ternary 0 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: readiness
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "tdt.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: readiness
    spec:
      automountServiceAccountToken: false
      initContainers:
        # Block until every TDT service answers HTTP, so the pod only becomes
        # Ready once the whole suite is genuinely usable.
        - name: wait-for-services
          image: {{ .Values.readiness.image | default "busybox:1.36" }}
          command: ["sh", "-c"]
          args:
            - for u in {{ $urlList }}; do until wget -q -T 2 -O /dev/null "$u"; do echo "waiting for $u"; sleep 3; done; echo "$u is up"; done
          resources:
            requests: { cpu: 1m, memory: 8Mi }
            limits: { cpu: 50m, memory: 16Mi }
      containers:
        - name: marker
          image: {{ .Values.readiness.image | default "busybox:1.36" }}
          command: ["sh", "-c", "trap 'exit 0' TERM; while true; do sleep 3600 & wait; done"]
          # Ready reflects live HTTP serving of every TDT service (not just an
          # open socket). Fails on the first unreachable service; -T bounds each
          # check so the probe fits its timeout.
          readinessProbe:
            exec:
              command: ["sh", "-c", "for u in {{ $urlList }}; do wget -q -T 2 -O /dev/null \"$u\" || exit 1; done"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 10
          resources:
            requests: { cpu: 1m, memory: 8Mi }
            limits: { cpu: 50m, memory: 16Mi }
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
{{- end }}
