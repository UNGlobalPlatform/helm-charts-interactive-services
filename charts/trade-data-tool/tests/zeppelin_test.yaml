suite: rule-engine wiring — bundled subchart, discovery, and degradation
templates:
  - secrets.yaml
  - secret-jdbc-target.yaml
  - secret-discovery.yaml
  - zeppelin-config-job.yaml
release:
  name: mytdt
  namespace: user-sean
tests:
  # ---- S1: bundled (the default). One release, complete suite. ----
  - it: bundled mode derives the subchart coordinates into appsettings
    templates: [secrets.yaml]
    set:
      zeppelin:
        security:
          password: "the-project-password"
        ingress:
          hostname: user-sean-tdt-zeppelin-abc.dev.officialstatistics.org
    documentSelector:
      path: metadata.name
      value: mytdt-trade-data-tool-appsettings
    asserts:
      - matchRegex:
          path: stringData["appsettings.Production.json"]
          pattern: '"APIURL": "http://mytdt-zeppelin:8080"'
      - matchRegex:
          path: stringData["appsettings.Production.json"]
          pattern: '"UserId": "onyxia"'
      - matchRegex:
          path: stringData["appsettings.Production.json"]
          pattern: '"Zeppelin": \{[^}]*"Password": "the-project-password"'
      - matchRegex:
          path: stringData["appsettings.Production.json"]
          pattern: '"WebURL": "https://user-sean-tdt-zeppelin-abc.dev.officialstatistics.org"'
  - it: bundled mode hands the database over via the jdbc-target secret
    templates: [secret-jdbc-target.yaml]
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: mytdt-jdbc-target
      - equal:
          path: stringData.MARIADB_DATABASE
          value: user_sean_mytdt
      - equal:
          path: stringData.MARIADB_HOST
          value: production.mariadb.svc.cluster.local
  - it: bundled mode renders NO push job (the subchart bootstraps itself)
    templates: [zeppelin-config-job.yaml]
    asserts:
      - hasDocuments:
          count: 0
  # ---- S3: external. Discovery is render-time lookup; in unit tests lookup
  # returns nothing, so with no manual override the engine resolves to none
  # and RuleService must still survive (valid placeholder URI — its ctor does
  # new Uri(APIURL) and null/empty throws during DI). ----
  - it: external mode with nothing discovered degrades to the placeholder
    templates: [secrets.yaml]
    set:
      zeppelin:
        enabled: false
    documentSelector:
      path: metadata.name
      value: mytdt-trade-data-tool-appsettings
    asserts:
      - matchRegex:
          path: stringData["appsettings.Production.json"]
          pattern: '"APIURL": "http://zeppelin-not-configured.invalid"'
      - matchRegex:
          path: stringData["appsettings.Production.json"]
          pattern: '"WebURL": "#"'
  - it: external mode with nothing discovered renders no jdbc-target and no push job
    templates: [secret-jdbc-target.yaml, zeppelin-config-job.yaml]
    set:
      zeppelin:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0
  - it: a manual external override wires appsettings
    templates: [secrets.yaml]
    set:
      zeppelin:
        enabled: false
      ruleEngine:
        external:
          apiUrl: "http://zep-external:8080"
          webUrl: "https://zep.example.org"
          password: "zep-pw"
    documentSelector:
      path: metadata.name
      value: mytdt-trade-data-tool-appsettings
    asserts:
      - matchRegex:
          path: stringData["appsettings.Production.json"]
          pattern: '"APIURL": "http://zep-external:8080"'
  - it: a manual external override renders the push job
    templates: [zeppelin-config-job.yaml]
    set:
      zeppelin:
        enabled: false
      ruleEngine:
        external:
          apiUrl: "http://zep-external:8080"
          password: "zep-pw"
    documentSelector:
      path: kind
      value: Job
    asserts:
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: zeppelin-config
  # ---- S2 seed: TDT publishes its database for later-launched services ----
  - it: publishes the mariadb discovery secret with a properly encoded port
    templates: [secret-discovery.yaml]
    asserts:
      - equal:
          path: metadata.annotations["onyxia/discovery"]
          value: mariadb
      - equal:
          path: data["mariadb-database"]
          # b64("user_sean_mytdt")
          value: dXNlcl9zZWFuX215dGR0
      - equal:
          path: data["mariadb-port"]
          # b64("3306") — properly encoded, unlike the catalog chart's raw port
          value: MzMwNg==
  - it: discovery publishing can be disabled
    templates: [secret-discovery.yaml]
    set:
      database:
        discoverable: false
    asserts:
      - hasDocuments:
          count: 0
