{{- $fullName := include "library-chart.fullname" . -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "library-chart.fullname" . }}
  labels:
    {{- include "library-chart.labels" . | nindent 4 }}
spec:
{{- if not .Values.autoscaling.enabled }}
  {{- if .Values.global.suspend }}
  replicas: 0
  {{- else }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
{{- end }}
  serviceName: {{ include "library-chart.fullname" . }}
  selector:
    matchLabels:
      {{- include "library-chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/shiro: {{ include (print $.Template.BasePath "/secret-shiro.yaml") . | sha256sum }}
        {{- if (.Values.git).enabled }}
        checksum/git: {{ include (print $.Template.BasePath "/secret-git.yaml") . | sha256sum }}
        {{- end }}
        {{- if (.Values.s3).enabled }}
        checksum/s3: {{ include (print $.Template.BasePath "/secret-s3.yaml") . | sha256sum }}
        {{- end }}
        {{- if (.Values.vault).enabled }}
        checksum/vault: {{ include (print $.Template.BasePath "/secret-vault.yaml") . | sha256sum }}
        {{- end }}
        {{- if not (empty (trim (include "library-chart.secretPostgreSQL" .))) }}
        checksum/postgresql: {{ include (print $.Template.BasePath "/secret-postgresql.yaml") . | sha256sum }}
        {{- end }}
        {{- if not (empty (trim (include "zeppelin.secretMariaDB" .))) }}
        checksum/mariadb: {{ include (print $.Template.BasePath "/secret-mariadb.yaml") . | sha256sum }}
        {{- end }}
        {{- if (.Values.certificates).cacerts }}
        checksum/cacerts: {{ .Values.certificates.cacerts | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "library-chart.selectorLabels" . | nindent 8 }}
    spec:
      volumes:
        - name: home
        {{- if (.Values.persistence).enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (include "library-chart.fullname" .) }}
        {{- else }}
          emptyDir: {}
        {{- end }}
        - name: shiro
          secret:
            secretName: {{ include "library-chart.fullname" . }}-shiro
        {{- if (.Values.certificates).cacerts }}
        - name: config-files
          emptyDir: {}
        - name: cacerts
          secret:
            secretName: {{ include "library-chart.secretNameCacerts" . }}
        {{- end }}
        {{- if and (.Values.git).enabled (.Values.git).sshKnownHosts }}
        - name: ssh-known-hosts
          configMap:
            name: {{ include "library-chart.fullname" . }}-ssh-known-hosts
        {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "library-chart.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.sparkConnect.enabled }}
      priorityClassName: spark-ide
      {{- end }}
      subdomain: {{ include "library-chart.fullname" . }}
      hostname: zeppelin
      {{- if (.Values.certificates).cacerts }}
      initContainers:
        - name: make-secrets-writable
          image: {{ .Values.service.initContainer.image }}
          imagePullPolicy: {{ .Values.service.initContainer.pullPolicy }}
          command:
            - sh
            - -c
            - |
              echo 'initContainer make-secrets-writable is started';
              mkdir /dest/cacerts;
              {{- if regexMatch "^https?://" .Values.certificates.cacerts }}
              curl -s $(cat /cacerts/ca-certs.url) -o /tmp/ca.pem
              {{- else }}
              cp /cacerts/ca.pem /tmp/ca.pem
              {{- end }}
              awk 'BEGIN {c=0;} /BEGIN CERT/{c++} { print > "/dest/cacerts/cert." c ".crt"}' < /tmp/ca.pem;
          volumeMounts:
            - name: config-files
              mountPath: /dest
            - name: cacerts
              mountPath: /cacerts
          resources:
            limits:
              cpu: 50m
              memory: 50Mi
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if .Values.service.image.custom.enabled }}
          image: "{{ .Values.service.image.custom.version }}"
          {{- else }}
          image: "{{ .Values.service.image.version }}"
          {{- end }}
          {{- $sparkInit := "" -}}
          {{- if .Values.sparkConnect.enabled -}}
          {{- $sparkInit = printf "python3 -m pip install --quiet --target=/opt/zeppelin/local-repo/python-packages 'pyspark[connect]==%s' 'apache-sedona==%s' 'h3==%s' grpcio grpcio-status protobuf && " .Values.sparkConnect.pysparkVersion .Values.sparkConnect.sedonaVersion .Values.sparkConnect.h3Version -}}
          {{- end }}
          command: ["/bin/bash","-c"]
          args:
            - |
              {{ $sparkInit }}if [ -x "{{ .Values.init.standardInitPath }}" ]; then
                exec "{{ .Values.init.standardInitPath }}" /opt/zeppelin/bin/zeppelin.sh
              else
                exec /opt/zeppelin/bin/zeppelin.sh
              fi
          imagePullPolicy: {{ .Values.service.image.pullPolicy }}
          env:
            - name: KUBERNETES_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: IMAGE_NAME
              {{- if .Values.service.image.custom.enabled }}
              value: "{{ .Values.service.image.custom.version }}"
              {{- else }}
              value: "{{ .Values.service.image.version }}"
              {{- end }}
            - name: PROJECT_USER
              value: {{ .Values.environment.user }}
            - name: PROJECT_GROUP
              value: {{ .Values.environment.group }}
            - name: ZEPPELIN_ADDR
              value: "0.0.0.0"
            - name: ZEPPELIN_SERVER_JETTY_REQUEST_HEADER_SIZE
              value: "32768"
            - name: ZEPPELIN_PORT
              value: {{ .Values.networking.service.port | quote }}
            # 0.12's default 'auto' mode detects the in-cluster service account and
            # switches to k8s mode, spawning one pod per interpreter. Keep everything
            # in this single pod.
            - name: ZEPPELIN_RUN_MODE
              value: "local"
            - name: ZEPPELIN_ANONYMOUS_ALLOWED
              value: "false"
            - name: ZEPPELIN_NOTEBOOK_DIR
              value: /opt/zeppelin/notebook
            {{- if .Values.init.regionInit }}
            - name: REGION_INIT_SCRIPT
              value: {{ .Values.init.regionInit }}
            {{- end }}
            {{- if .Values.init.personalInit }}
            - name: PERSONAL_INIT_SCRIPT
              value: {{ .Values.init.personalInit }}
            {{- end }}
            {{- if .Values.init.personalInitArgs }}
            - name: PERSONAL_INIT_ARGS
              value: {{ .Values.init.personalInitArgs }}
            {{- end }}
            {{- if .Values.sparkConnect.enabled }}
            - name: SPARK_REMOTE
              value: "sc://{{ include "library-chart.fullname" . }}-spark-connect:15002"
            - name: PYTHONPATH
              value: /opt/zeppelin/local-repo/python-packages
            {{- if .Values.sparkConnect.aisBasepath }}
            - name: AIS_BASEPATH
              value: {{ .Values.sparkConnect.aisBasepath | quote }}
            {{- end }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "library-chart.secretNameToken" . }}
            {{- if (.Values.git).enabled }}
            - secretRef:
                name: {{ include "library-chart.secretNameGit" . }}
            {{- end }}
            {{- if (.Values.s3).enabled }}
            - secretRef:
                name: {{ include "library-chart.secretNameS3" . }}
            {{- end }}
            {{- if (.Values.vault).enabled }}
            - secretRef:
                name: {{ include "library-chart.secretNameVault" . }}
            {{- end }}
            {{- if (.Values.proxy).enabled }}
            - secretRef:
                name: {{ include "library-chart.secretNameProxy" . }}
            {{- end }}
            {{- if not (empty (trim (include "library-chart.secretPostgreSQL" .))) }}
            - secretRef:
                name: {{ include "library-chart.secretNamePostgreSQL" . }}
            {{- end }}
            {{- if not (empty (trim (include "zeppelin.secretMariaDB" .))) }}
            - secretRef:
                name: {{ include "zeppelin.secretNameMariaDB" . }}
            {{- end }}
            {{- if .Values.extraEnvVars }}
            - secretRef:
                name: {{ include "library-chart.secretNameExtraEnv" . }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/version
              port: {{ .Values.networking.service.port }}
            timeoutSeconds: 2
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /api/version
              port: {{ .Values.networking.service.port }}
          {{- if hasKey .Values "startupProbe" }}
          startupProbe:
            httpGet:
              path: /api/version
              port: {{ .Values.networking.service.port }}
            {{- toYaml .Values.startupProbe | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - mountPath: /opt/zeppelin/notebook
              subPath: notebook
              name: home
            - mountPath: /opt/zeppelin/local-repo
              subPath: local-repo
              name: home
            - name: shiro
              mountPath: /opt/zeppelin/conf/shiro.ini
              subPath: shiro.ini
              readOnly: true
            {{- if and (.Values.certificates).cacerts (.Values.certificates).pathToCaBundle }}
            - name: config-files
              mountPath: {{ .Values.certificates.pathToCaBundle }}
              subPath: cacerts
            {{- end }}
            {{- if and (.Values.git).enabled (.Values.git).sshKnownHosts }}
            - name: ssh-known-hosts
              mountPath: /opt/ssh/known_hosts
              subPath: known_hosts
              readOnly: true
            {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- if .Values.sparkConnect.enabled }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: spotinst.io/node-lifecycle
                    operator: In
                    values:
                      - od
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: workload-type
                    operator: In
                    values:
                      - spark
      tolerations:
        - key: workload-type
          operator: Equal
          value: spark
          effect: NoSchedule
      {{- with .Values.tolerations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- else }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
