# Default values for zeppelin.
global:
  suspend: false

service:
  initContainer:
    image: "inseefrlab/onyxia-base:latest"
    pullPolicy: IfNotPresent
  image:
    version: "apache/zeppelin:0.12.0"
    pullPolicy: IfNotPresent
    custom:
      enabled: false
      version: "apache/zeppelin:0.12.0"

security:
  password: "changeme"
  networkPolicy:
    enabled: false
    from: []
  allowlist:
    enabled: false
    ip: "0.0.0.0/0"

init:
  standardInitPath: "/opt/onyxia-init.sh"
  regionInit: ""
  personalInit: ""
  personalInitArgs: ""

# Array with (templated) extra environment variables to be made accessible within the service
# e.g:
# extraEnvVars:
#   - name: FOO
#     value: "bar"
extraEnvVars: []

environment:
  user: onyxia
  group: users

s3:
  # Specifies whether S3 credentials should be made available
  enabled: false
  # The name of the secret storing the S3 credentials
  secretName: ""  # Generated based on the service's name if empty or not set
  accessKeyId: ""
  endpoint: ""
  defaultRegion: ""
  secretAccessKey: ""
  sessionToken: ""
  pathStyleAccess: false
  workingDirectoryPath: ""

vault:
  # Specifies whether Vault credentials should be made available
  enabled: false
  # The name of the secret storing the Vault credentials
  secretName: ""  # Generated based on the service's name if empty or not set
  token: ""
  url: ""
  mount: ""
  secret: ""
  directory: ""

git:
  # Specifies whether git credentials should be made available
  enabled: false
  # The name of the secret storing the git credentials
  secretName: ""  # Generated based on the service's name if empty or not set
  name: ""
  email: ""
  cache: ""
  token: ""
  repository: ""
  branch: ""
  sshKnownHosts: ""  # Optional: pre-populated SSH known_hosts entries (output of ssh-keyscan)

# active ou non la recherche de secrets discovery dans le namespace
# see secret-{service}.yaml
discovery:
  postgresql: true
  mariadb: true
  # Publish an onyxia/discovery "zeppelin" secret so other services (e.g. the
  # Trade Data Tool rule engine) can find this Zeppelin without copy-pasting.
  publish: true

# JDBC target for the %jdbc interpreter. Leave empty: a MariaDB discovered in
# the namespace (onyxia/discovery "mariadb") is wired automatically. A parent
# chart bundling zeppelin sets these explicitly — it knows its own database at
# render time, and a release can never look up a secret it is itself creating.
jdbc:
  # Name of an existing Secret holding the MARIADB_* connection keys; rendered
  # through tpl, so a parent chart bundling zeppelin can pass
  # '{{ .Release.Name }}-jdbc-target' and create that Secret itself with its
  # render-time-derived database coordinates. Takes precedence over host/
  # discovery below.
  existingSecret: ""
  host: ""
  port: 3306
  database: ""
  username: ""
  password: ""
  # Maven coordinates of the MariaDB driver (the stock image ships none).
  driverArtifact: "org.mariadb.jdbc:mariadb-java-client:3.4.1"
  configImage: "python:3.12-slim"

postgresql:
  secretName: ""

mariadb:
  secretName: ""

replicaCount: 1

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

kubernetes:
  enabled: false
  role: "view"

podAnnotations: {}

podSecurityContext:
  # apache/zeppelin runs as uid/gid 1000
  fsGroup: 1000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

networking:
  type: ClusterIP
  clusterIP: None
  service:
    port: 8080
  sparkui:
    port: 4040
  # Custom user-specified extra ports exposition.
  # If ingress or route is enabled, the exposed ports are also made available at the
  # {ingress,route}.userHostname URL (or variations, in case several ports are provided).
  # Note: a non-empty networking.user.ports overrides networking.user.port
  user:
    enabled: false
    port: 5000
    ports: []

ingress:
  enabled: false
  tls: true
  ingressClassName: ""
  annotations: []
    # kubernetes.io/tls-acme: "true"
  hostname: chart-example.local
  userHostname: chart-example-user.local
  path: /
  userPath: /
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
  useCertManager: false
  certManagerClusterIssuer: ""
  useTlsSecret: false
  tlsSecretName: ""

route:
  enabled: false
  annotations: []
    # route.openshift.io/termination: "reencrypt"
  hostname: chart-example.local
  userHostname: chart-example-user.local
  tls:
    termination: edge
    # key:
    # certificate:
    # caCertificate:
    # destinationCACertificate:
  wildcardPolicy: None

resources:
  requests:
    cpu: "1000m"
    memory: "2Gi"
  limits:
    cpu: "4000m"
    memory: "16Gi"

persistence:
  # Notebooks, interpreter settings, note permissions and credentials all live
  # on this volume; without it every pod restart (including a platform
  # suspend/resume cycle) silently discards the user's work. Enabled here in
  # values so the default holds on every install path — the Onyxia schema
  # default only applies to direct catalog launches, not when this chart is
  # bundled as a subchart (e.g. inside trade-data-tool).
  enabled: true
  # When true, helm uninstall keeps the volume (and the notebooks on it); a
  # reinstall under the same release name adopts it back.
  retainOnDelete: false
  ## database data Persistent Volume Storage Class
  ## If defined, storageClassName: <storageClass>
  ## If set to "-", storageClassName: "", which disables dynamic provisioning
  ## If undefined (the default) or set to null, no storageClassName spec is
  ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
  ##   GKE, AWS & OpenStack)
  ##
  # storageClass: "-"
  accessMode: ReadWriteOnce
  size: 10Gi
  # existingClaim: ""

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

startupProbe:
  failureThreshold: 60
  initialDelaySeconds: 10
  periodSeconds: 10
  successThreshold: 1
  timeoutSeconds: 2

userPreferences:
  language: "en"

sparkConnect:
  enabled: false
  image: "142496269814.dkr.ecr.us-west-2.amazonaws.com/ais/spark/un-ais-etl:v0.9.0-python311"
  pysparkVersion: "3.5.0"
  sedonaVersion: "1.7.0"
  h3Version: "4.4.2"
  logLevel: "WARN"
  aisBasepath: "s3a://ais-data-142496269814/exact-earth-data/transformed/prod/"
  keda:
    enabled: true
  server:
    resources:
      requests:
        cpu: "8"
        memory: "20Gi"
      limits:
        cpu: "8"
        memory: "24Gi"
  executor:
    maxExecutors: "25"
    cores: "2"
    memory: "4g"
    memoryOverhead: "3g"
  sparkui:
    hostname: ""

openshiftSCC:
  enabled: false
  scc: ""

proxy:
  enabled: false
  noProxy: ""
  httpProxy: ""
  httpsProxy: ""

certificates: {}
  # pathToCaBundle: /usr/local/share/ca-certificates/
  # cacerts: ""

message:
  fr: ""
  en: ""
