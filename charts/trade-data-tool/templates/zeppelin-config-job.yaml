{{- $zepResolved := include "tdt.zeppelinResolved" . | fromJson }}
{{- if and (not .Values.zeppelin.enabled) (ne $zepResolved.source "none") (not .Values.global.suspend) }}
{{/*
External mode only (bundled mode is handled by the subchart's own jdbc
bootstrap via the -jdbc-target secret): points the DISCOVERED (or manually
configured) Zeppelin's jdbc interpreter at this release's database. TDT is
the later-launched service here, so it is the one that can see both sides.
TDT's rules are SQL paragraphs run through that interpreter, and the stock
Zeppelin 0.12 image ships no MariaDB driver — upstream solved this by baking
a jar into a custom image; we declare it as a Maven dependency instead and
Zeppelin fetches it on first use. TDT holds every ingredient (its own DB
coordinates, Zeppelin's URL and admin login), so this job simply logs in via
shiro and PUTs the interpreter setting. Idempotent; re-runs on every upgrade.
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "tdt.fullname" . }}-zeppelin-config-{{ .Release.Revision }}
  labels:
    {{- include "tdt.labels" . | nindent 4 }}
    app.kubernetes.io/component: zeppelin-config
spec:
  backoffLimit: 4
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        # No app.kubernetes.io/instance — see schema-job.yaml: a completed Job pod
        # with this label is read by Onyxia as a never-ready task.
        app.kubernetes.io/component: zeppelin-config
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      containers:
        - name: zeppelin-config
          image: {{ .Values.security.admin.seedImage | default "python:3.12-slim" }}
          env:
            - name: ZEPPELIN_API_URL
              value: {{ $zepResolved.apiUrl | quote }}
            - name: ZEPPELIN_USER
              value: {{ $zepResolved.username | quote }}
            - name: ZEPPELIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "tdt.fullname" . }}-zeppelin
                  key: password
            - name: TDT_DB_HOST
              value: {{ include "tdt.dbHost" . | quote }}
            - name: TDT_DB_NAME
              value: {{ include "tdt.dbName" . | quote }}
            - name: TDT_DB_USER
              value: {{ include "tdt.dbUserName" . | quote }}
            - name: TDT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "tdt.fullname" . }}-db
                  key: password
            - name: MARIADB_DRIVER_ARTIFACT
              value: {{ .Values.ruleEngine.driverArtifact | default "org.mariadb.jdbc:mariadb-java-client:3.4.1" | quote }}
          command: ["python3", "-c"]
          args:
            - |
              import json, os, time, urllib.request, urllib.parse, http.cookiejar, sys

              api = os.environ["ZEPPELIN_API_URL"].rstrip("/")
              cj = http.cookiejar.CookieJar()
              opener = urllib.request.build_opener(urllib.request.HTTPCookieProcessor(cj))

              def call(method, path, data=None, form=False, timeout=30):
                  body = None
                  headers = {}
                  if data is not None:
                      if form:
                          body = urllib.parse.urlencode(data).encode()
                          headers["Content-Type"] = "application/x-www-form-urlencoded"
                      else:
                          body = json.dumps(data).encode()
                          headers["Content-Type"] = "application/json"
                  req = urllib.request.Request(api + path, data=body, headers=headers, method=method)
                  with opener.open(req, timeout=timeout) as r:
                      return json.loads(r.read() or b"{}")

              # Zeppelin may still be starting (it is launched independently).
              for attempt in range(60):
                  try:
                      call("POST", "/api/login", {"userName": os.environ["ZEPPELIN_USER"],
                                                  "password": os.environ["ZEPPELIN_PASSWORD"]}, form=True)
                      break
                  except Exception as e:
                      print(f"waiting for zeppelin ({e}); attempt {attempt+1}/60", flush=True)
                      time.sleep(10)
              else:
                  sys.exit("zeppelin never became reachable / login failed")

              settings = call("GET", "/api/interpreter/setting")["body"]
              jdbc = next(s for s in settings if s["group"] == "jdbc")
              props = jdbc["properties"]

              def setp(key, value):
                  props.setdefault(key, {"name": key, "type": "string"})
                  props[key]["value"] = value

              setp("default.driver", "org.mariadb.jdbc.Driver")
              setp("default.url", "jdbc:mariadb://%s:3306/%s" % (os.environ["TDT_DB_HOST"], os.environ["TDT_DB_NAME"]))
              setp("default.user", os.environ["TDT_DB_USER"])
              setp("default.password", os.environ["TDT_DB_PASSWORD"])

              call("PUT", "/api/interpreter/setting/" + jdbc["id"], {
                  "properties": props,
                  "option": jdbc["option"],
                  "dependencies": [{"groupArtifactVersion": os.environ["MARIADB_DRIVER_ARTIFACT"],
                                    "exclusions": []}],
              }, timeout=120)
              print("jdbc interpreter configured for database %s" % os.environ["TDT_DB_NAME"])
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 250m, memory: 256Mi }
{{- end }}
