# Default values for trade-data-tool.

global:
  # Onyxia sets this from the service "pause" control; all workloads scale to 0.
  suspend: false

image:
  registry: 142496269814.dkr.ecr.us-west-2.amazonaws.com/tdt
  # One tag for every service image (built together from the same commit).
  tag: "v2.1.0"
  pullPolicy: IfNotPresent
  # Name of an existing docker-registry Secret in the release namespace, if the
  # registry is private.
  pullSecretName: ""

# The eight application services. Ports are cluster-internal (Service port ->
# container :80); names become <release>-<key>.
services:
  fileservice:
    port: 6702
    image: file-service
  userservice:
    port: 6904
    image: user-service
  domainservice:
    port: 6902
    image: domain-service
  dataservice:
    port: 6901
    image: data-service
  metadataservice:
    port: 6801
    image: metadata-service
  ruleengineservice:
    port: 8402
    image: ruleengine-service
  coreservice:
    port: 6912
    image: core-service

web:
  port: 7108
  image: web-app

# Every container must declare cpu+memory limits (namespace ResourceQuota).
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: "1000m"
    memory: 1024Mi

database:
  # The platform's shared MariaDB (mariadb-operator SQL-tier CRs, no pods).
  cluster:
    name: production
    namespace: mariadb
  auth:
    # The database and user names are derived per-release by the chart
    # (<namespace>_<release>) so instances never share a database. Only the
    # password is configurable.
    password: "changeme"
  connections:
    tier: medium  # small | medium | large -> maxUserConnections 10/50/200
  lifecycle:
    # When true, helm uninstall keeps the database and user on the cluster.
    retainOnDelete: false
  # Publish this release's database as an onyxia/discovery "mariadb" secret so
  # discovery-aware services (e.g. a standalone Zeppelin) can connect to it.
  discoverable: true
  schema:
    # Load the TDT schema (tables + stored procedures) on install/upgrade.
    bootstrap: true
    # Image containing /docker-entrypoint-initdb.d/*.sql; defaults to the
    # release's own mariadb-service image (same commit as the app images).
    image: mariadb-service

# File upload rules read by the web UI (TDT.Web/Helper/AppSettings.cs). The
# images bake no FileService section at all, so these MUST be set here: a null
# AllowedExt throws NullReferenceException on the upload pages, and an unset
# MaxFileSize converts to 0, which rejects every file as too large.
# Defaults match what the engineers actually deploy: base/TDT.Web/Deploy/
# tdt-webui-secrets.yaml. (Not overlays/*/patches-secretes.yml — deployment.ps1
# excludes that file, so its wider extension list is never applied and is stale.)
uploads:
  # Extensions accepted by the File Service upload pages (comma-separated, no dots).
  allowedExtensions: "tsv,txt,csv"
  # Extensions accepted by the Domain/Metadata import pages.
  importAllowedExtensions: "xlsx,csv,txt"
  # Largest accepted upload, in bytes (default ~300 MiB, matching the cloud deploy).
  maxFileSizeBytes: 314572900

objectStorage:
  # minio: a small MinIO deployed with this release (default).
  # s3: AWS S3 with the caller's credentials.
  provider: minio
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    rootUser: tdt
    rootPassword: "changeme-minio"
    ingress:
      # Browser-reachable hostname for MinIO's S3 API. The web UI uploads by
      # handing the browser a presigned URL built against MinioConfig:ApiUrl
      # (over HTTPS), so in minio mode this MUST be set for uploads to work
      # from outside the cluster. When empty, presigned URLs fall back to the
      # in-cluster endpoint (fine for headless/in-cluster use only). Onyxia
      # fills this next to the web hostname; rides the same wildcard cert.
      hostname: ""
    persistence:
      size: 10Gi
      storageClass: ""
      # When true, helm uninstall keeps the MinIO volume (and the uploaded
      # files) on the cluster; a reinstall under the same release name adopts
      # it back. Mirrors database.lifecycle.retainOnDelete. The cluster's gp3
      # storage class has reclaimPolicy Delete, so without this the EBS volume
      # is destroyed with the release.
      retainOnDelete: false
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  s3:
    region: ""
    endpoint: ""
    accessKeyId: ""
    secretAccessKey: ""
    sessionToken: ""
    forcePathStyle: false
    # Onyxia's per-user working directory: "<shared-bucket>/<prefix>/". The chart
    # splits it into the real bucket + the base prefix the logical buckets live
    # under. Filled from the platform's ide/s3.json (see values.schema.json).
    workingDirectoryPath: ""
  buckets:
    domain: domainfile
    metadata: metadatafile
    system: system

# The rule engine. TDT rules are SQL paragraphs in Apache Zeppelin notebooks:
# RuleService drives Zeppelin's REST API (login, run paragraph, poll status),
# CoreService's Silver pipeline runs rule paragraphs, and the web UI
# deep-links into Zeppelin ("/#/notebook/<ruleId>"). A Zeppelin is BUNDLED
# with this chart by default (zeppelin.enabled below) — the suite is not
# complete without one. With bundling disabled, an existing Zeppelin in the
# namespace is found through its onyxia/discovery secret at install time
# (relaunch/upgrade this service after launching Zeppelin to re-discover);
# the fields here are a manual override for non-discovery environments.
ruleEngine:
  external:
    apiUrl: ""
    webUrl: ""
    username: ""
    password: ""
  # Interpreter group used when TDT creates notebooks (rules are SQL -> jdbc).
  defaultInterpreterGroup: jdbc

# Values for the bundled Zeppelin subchart (charts/zeppelin). Everything a
# launch needs is derived or filled by Onyxia; nothing to paste anywhere.
zeppelin:
  # Bundle a Zeppelin with this release (recommended — the rule engine is an
  # integral part of TDT). Disable to use an existing Zeppelin via discovery.
  enabled: true
  jdbc:
    # Hands this release's database to the subchart's jdbc bootstrap. The
    # name is tpl-rendered inside the subchart; TDT creates the secret (see
    # secret-jdbc-target.yaml) with its render-time-derived coordinates —
    # subchart values are static YAML, so this is the only channel.
    existingSecret: "{{ .Release.Name }}-jdbc-target"
  security:
    # Onyxia fills this with the project password (same as the TDT admin
    # login), keeping RuleService's Zeppelin login zero-copy.
    password: "changeme"
  persistence:
    # Rule notebooks and interpreter state live on this volume. It MUST stay
    # enabled: the platform culler suspends services after ~12h (pods deleted,
    # volumes kept), and without it every suspend cycle silently deletes the
    # users' rules. Stated explicitly here even though 1.4.0's subchart
    # default is also true.
    enabled: true
    size: 10Gi
    # When true, helm uninstall keeps the notebook volume; a reinstall under
    # the same release name adopts it back. Mirrors the database and MinIO
    # retainOnDelete flags.
    retainOnDelete: false
  ingress:
    enabled: true
    hostname: chart-example-zeppelin.local
    ingressClassName: nginx
    useCertManager: true
    certManagerClusterIssuer: letsencrypt-prod
  route:
    enabled: false
  # The zeppelin chart's own defaults (4 CPU / 16Gi limits) are sized for
  # heavy notebook work; the TDT rule engine only runs jdbc paragraphs.
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

security:
  jwt:
    # Symmetric signing key for UserService-issued JWTs; generated per release
    # when left empty.
    key: ""
  admin:
    # The TDT application login. On every deploy an admin-seed job sets this
    # account's password (hashed) so it matches the value below, and deactivates
    # the other upstream-seeded account. Onyxia fills adminPassword with the
    # user's stable project password.
    seed: true
    username: SAdmin
    password: "changeme"
    # Seeded accounts other than `username` to deactivate (IsActive=0).
    deactivateUsernames:
      - DAdmin

ingress:
  enabled: true
  ingressClassName: nginx
  hostname: chart-example.local
  tls: true
  certManagerClusterIssuer: letsencrypt-prod
  useCertManager: true

userPreferences:
  language: en

# Near-zero-footprint marker pod that gives Onyxia an honest "ready" signal
# (green only once the web UI actually serves HTTP). Disable for headless use.
readiness:
  enabled: true
  image: busybox:1.36

# Extra appsettings merged into every service's configuration (escape hatch).
extraAppSettings: {}
