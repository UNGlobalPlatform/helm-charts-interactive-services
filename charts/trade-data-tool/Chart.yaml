apiVersion: v2
name: trade-data-tool
description: >-
  Trade Data Tool (UNSD) — eight .NET microservices and a Blazor web UI for
  processing trade datasets. Provisions its database serverlessly on the
  platform's shared MariaDB cluster and stores files in bundled MinIO or S3.
icon: https://minio.lab.sspcloud.fr/projet-onyxia/assets/servicesImg/library.png
keywords:
  - TradeDataTool
  - TDT
  - Statistics
home: https://code.officialstatistics.org/trade-data-tools/tdt-source/TradeDataTools
sources:
  - https://code.officialstatistics.org/trade-data-tools/tdt-source/TradeDataTools
type: application
version: 0.5.3
appVersion: "2.4.0"
dependencies:
  - name: zeppelin
    version: 1.4.1
    # Same-repo path: keeps zeppelin+tdt changes atomic in one PR and embeds
    # the subchart in the released package (no publish-ordering constraint).
    repository: file://../zeppelin
    condition: zeppelin.enabled
