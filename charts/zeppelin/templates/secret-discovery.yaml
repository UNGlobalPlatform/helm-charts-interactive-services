{{- if (.Values.discovery).publish }}
{{/*
Makes this Zeppelin discoverable by other services in the namespace (the
mirror image of the onyxia/discovery "mariadb" convention this chart already
consumes). A consumer — e.g. the Trade Data Tool, which drives Zeppelin as its
rule engine — looks this up at its own install time to wire API URL, browser
URL and login without any copy-pasting.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: discoverable-{{ include "library-chart.fullname" . }}
  labels:
    {{- include "library-chart.labels" . | nindent 4 }}
  annotations:
    onyxia/discovery: "zeppelin"
type: Opaque
data:
  zeppelin-service: {{ include "library-chart.fullname" . | b64enc | quote }}
  zeppelin-port: {{ .Values.networking.service.port | toString | b64enc | quote }}
  {{- if .Values.ingress.enabled }}
  zeppelin-web-url: {{ printf "https://%s" .Values.ingress.hostname | b64enc | quote }}
  {{- end }}
  zeppelin-username: {{ .Values.environment.user | b64enc | quote }}
  password: {{ .Values.security.password | b64enc | quote }}
{{- end }}
