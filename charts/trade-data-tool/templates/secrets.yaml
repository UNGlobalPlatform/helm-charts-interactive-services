{{/* Password for the database User CR (referenced by passwordSecretKeyRef). */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tdt.fullname" . }}-db
  labels:
    {{- include "tdt.labels" . | nindent 4 }}
stringData:
  password: {{ .Values.database.auth.password | quote }}
---
{{/* One appsettings.Production.json shared by every service. */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tdt.fullname" . }}-appsettings
  labels:
    {{- include "tdt.labels" . | nindent 4 }}
stringData:
  appsettings.Production.json: |-
    {{- include "tdt.appsettings" . | nindent 4 }}
{{- if and (eq .Values.objectStorage.provider "s3") (not .Values.objectStorage.s3.accessKeyId) }}
{{- fail "objectStorage.provider=s3 requires objectStorage.s3.accessKeyId/secretAccessKey (Onyxia injects these)" }}
{{- end }}
{{- if eq .Values.objectStorage.provider "s3" }}
---
{{/* AWS credentials for FileService when using S3 (STS session shape). */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tdt.fullname" . }}-s3
  labels:
    {{- include "tdt.labels" . | nindent 4 }}
stringData:
  AWS_ACCESS_KEY_ID: {{ .Values.objectStorage.s3.accessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.objectStorage.s3.secretAccessKey | quote }}
  {{- if .Values.objectStorage.s3.sessionToken }}
  AWS_SESSION_TOKEN: {{ .Values.objectStorage.s3.sessionToken | quote }}
  {{- end }}
{{- end }}
{{- if eq .Values.objectStorage.provider "minio" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tdt.fullname" . }}-minio
  labels:
    {{- include "tdt.labels" . | nindent 4 }}
stringData:
  MINIO_ROOT_USER: {{ .Values.objectStorage.minio.rootUser | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.objectStorage.minio.rootPassword | quote }}
{{- end }}
