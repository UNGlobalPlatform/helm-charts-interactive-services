{{- if .Values.database.discoverable }}
{{/*
Publishes this release's database under the platform's onyxia/discovery
"mariadb" convention (same contract as the databases catalog's mariadb
chart), so a standalone Zeppelin — or any other discovery-aware service —
launched later in the namespace can connect to it out of the box.
mariadb-port is base64 like every other key (the catalog chart writes it raw;
consumers should use a digits-as-is fallback either way).
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: discoverable-{{ include "tdt.fullname" . }}
  labels:
    {{- include "tdt.labels" . | nindent 4 }}
  annotations:
    onyxia/discovery: "mariadb"
type: Opaque
data:
  mariadb-service: {{ include "tdt.dbHost" . | b64enc | quote }}
  mariadb-port: {{ "3306" | b64enc | quote }}
  mariadb-database: {{ include "tdt.dbName" . | b64enc | quote }}
  mariadb-username: {{ include "tdt.dbUserName" . | b64enc | quote }}
  password: {{ .Values.database.auth.password | b64enc | quote }}
{{- end }}
