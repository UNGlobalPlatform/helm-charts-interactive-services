{{- if .Values.zeppelin.enabled }}
{{/*
Hands this release's database to the bundled Zeppelin's jdbc bootstrap.
Subchart values are static YAML — the derived database name cannot be
injected there — so both sides agree on this secret by convention instead:
zeppelin.jdbc.existingSecret is the tpl string '{{ .Release.Name }}-jdbc-target',
rendered identically in the subchart (shared .Release), and this template
creates it.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-jdbc-target
  labels:
    {{- include "tdt.labels" . | nindent 4 }}
stringData:
  MARIADB_HOST: {{ include "tdt.dbHost" . | quote }}
  MARIADB_PORT: "3306"
  MARIADB_DATABASE: {{ include "tdt.dbName" . | quote }}
  MARIADB_USER: {{ include "tdt.dbUserName" . | quote }}
  MARIADB_PASSWORD: {{ .Values.database.auth.password | quote }}
{{- end }}
