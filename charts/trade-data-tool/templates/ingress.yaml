{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "tdt.fullname" . }}
  labels:
    {{- include "tdt.labels" . | nindent 4 }}
  {{- if and .Values.ingress.tls .Values.ingress.useCertManager }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.certManagerClusterIssuer }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.ingressClassName }}
  rules:
    - host: {{ .Values.ingress.hostname | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "tdt.svcName" (dict "ctx" . "key" "web") }}
                port:
                  number: {{ .Values.web.port }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.hostname | quote }}
      secretName: {{ include "tdt.fullname" . }}-tls
  {{- end }}
{{- end }}
